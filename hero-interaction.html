<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Hero Interaction</title>
  <style>
    :root {
      --bg: #f8f7fc;
      --surface: #fdfcff;
      --text: #1e1a2b;
      --muted: #5e5772;
      --accent: #8c63ff;
      --accent-dark: #6f46de;
      --marquee-text: #f8f3ff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      overflow-x: clip;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: min(82vh, 980px);
      display: grid;
      place-items: center;
      padding: clamp(2rem, 4vw, 4rem);
      background:
        radial-gradient(1000px 500px at 50% -10%, rgba(170, 148, 255, 0.18), transparent 70%),
        linear-gradient(180deg, #fcfbff 0%, #f9f7ff 100%);
      isolation: isolate;
    }

    .hero__frame {
      position: relative;
      width: min(1200px, 100%);
      aspect-ratio: 16 / 9;
      border-radius: clamp(24px, 2vw, 36px);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.82));
      border: 1px solid rgba(144, 114, 236, 0.13);
      box-shadow:
        0 32px 80px rgba(88, 63, 160, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.9);
      overflow: hidden;
    }

    .hero__orbs {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      will-change: transform, opacity;
      background:
        radial-gradient(circle at 35% 22%, rgba(255,255,255,0.55), rgba(255,255,255,0.12) 28%, rgba(255,255,255,0.03) 38%, transparent 52%),
        radial-gradient(circle at 62% 66%, rgba(45, 27, 86, 0.18), rgba(45, 27, 86, 0.03) 48%, transparent 75%),
        linear-gradient(135deg, rgba(207, 185, 255, 0.78), rgba(150, 117, 238, 0.62));
      filter: blur(0.2px) saturate(108%);
      opacity: 0.88;
      transform: translate3d(0, 0, 0);
    }

    .orb::before {
      content: "";
      position: absolute;
      inset: 10% 12% auto;
      height: 42%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.46), rgba(255,255,255,0.08) 62%, transparent 76%);
      filter: blur(6px);
      opacity: 0.85;
    }

    .orb--1 {
      width: clamp(190px, 22vw, 320px);
      height: clamp(190px, 22vw, 320px);
      box-shadow:
        0 36px 68px rgba(134, 102, 218, 0.22),
        inset 0 -18px 36px rgba(75, 45, 145, 0.15);
    }

    .orb--2 {
      width: clamp(130px, 16vw, 230px);
      height: clamp(130px, 16vw, 230px);
      opacity: 0.82;
      box-shadow:
        0 24px 56px rgba(116, 84, 203, 0.2),
        inset 0 -14px 28px rgba(63, 39, 126, 0.16);
    }

    .orb--3 {
      width: clamp(88px, 10vw, 150px);
      height: clamp(88px, 10vw, 150px);
      opacity: 0.9;
      box-shadow:
        0 18px 46px rgba(124, 95, 209, 0.2),
        inset 0 -10px 20px rgba(55, 34, 112, 0.15);
    }

    .hero__content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: flex-end;
      padding: clamp(1.3rem, 3.4vw, 3rem);
    }

    .hero__copy {
      max-width: min(72ch, 75%);
      backdrop-filter: blur(4px);
      background: linear-gradient(90deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
      border: 1px solid rgba(153, 126, 232, 0.16);
      border-radius: 18px;
      padding: clamp(1rem, 2.1vw, 1.8rem);
    }

    .hero__eyebrow {
      margin: 0 0 0.6rem;
      font-size: clamp(0.78rem, 1vw, 0.95rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(108, 88, 171, 0.92);
      font-weight: 600;
    }

    h1 {
      margin: 0;
      font-weight: 600;
      font-size: clamp(1.6rem, 4vw, 3.2rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .hero__description {
      margin: 0.9rem 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: clamp(0.94rem, 1.25vw, 1.08rem);
      letter-spacing: -0.005em;
    }

    .marquee-wrap {
      position: relative;
      z-index: 5;
      margin-top: clamp(-2.6rem, -5vw, -3.6rem);
      margin-bottom: clamp(-1.6rem, -2.5vw, -2rem);
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .marquee {
      width: min(120vw, 1600px);
      background: linear-gradient(90deg, #8154f0, #9668ff 52%, #8455f1);
      color: var(--marquee-text);
      height: clamp(50px, 6vw, 68px);
      border-radius: 999px;
      transform: rotate(-4.2deg);
      box-shadow: 0 14px 30px rgba(92, 59, 179, 0.36);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.26);
      display: flex;
      align-items: center;
    }

    .marquee__track {
      display: flex;
      align-items: center;
      width: max-content;
      min-width: 200%;
      animation: marqueeScroll 32s linear infinite;
      will-change: transform;
    }

    .marquee__group {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      padding-right: 2.6rem;
    }

    .marquee__item {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      font-size: clamp(0.9rem, 1.6vw, 1.18rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      padding: 0 0.45rem;
    }

    .star {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      opacity: 0.96;
      filter: drop-shadow(0 0 5px rgba(248, 235, 255, 0.38));
    }

    @keyframes marqueeScroll {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-50%, 0, 0); }
    }

    .about {
      background: var(--surface);
      min-height: 58vh;
      padding: clamp(5rem, 8vw, 8rem) clamp(1.2rem, 5vw, 5rem) clamp(3rem, 6vw, 5rem);
    }

    .about__inner {
      max-width: 960px;
      margin: 0 auto;
    }

    .about h2 {
      margin: 0 0 1rem;
      font-size: clamp(1.4rem, 3vw, 2.3rem);
      letter-spacing: -0.015em;
    }

    .about p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: clamp(0.95rem, 1.2vw, 1.06rem);
    }

    @media (max-width: 900px) {
      .hero__frame { aspect-ratio: 16 / 11; }
      .hero__copy { max-width: 92%; }
      .marquee { transform: rotate(-3.4deg); }
    }

    @media (max-width: 600px) {
      .hero { min-height: 70vh; padding: 1rem; }
      .hero__frame { border-radius: 22px; aspect-ratio: 9 / 12; }
      .hero__content { align-items: flex-end; }
      .marquee {
        width: 132vw;
        border-radius: 26px;
        transform: rotate(-3deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .marquee__track { animation-duration: 65s; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__frame" id="heroFrame">
        <div class="hero__orbs" aria-hidden="true">
          <span class="orb orb--1"></span>
          <span class="orb orb--2"></span>
          <span class="orb orb--3"></span>
        </div>
        <div class="hero__content">
          <div class="hero__copy">
            <p class="hero__eyebrow">PORTFOLIO</p>
            <h1 id="hero-title">감각을 넘어, 목적이 선명한 디자인을 만듭니다.</h1>
            <p class="hero__description">조용한 톤, 단단한 구조, 그리고 섬세한 상호작용으로 사용자의 흐름을 부드럽게 연결합니다.</p>
          </div>
        </div>
      </div>
    </section>

    <div class="marquee-wrap" aria-hidden="true">
      <section class="marquee">
        <div class="marquee__track">
          <div class="marquee__group" id="groupA"></div>
          <div class="marquee__group" id="groupB"></div>
        </div>
      </section>
    </div>

    <section class="about" aria-labelledby="about-title">
      <div class="about__inner">
        <h2 id="about-title">About</h2>
        <p>브랜드의 결을 읽고, 사용자 경험의 우선순위를 정리해 문제를 정확히 해결하는 인터페이스를 설계합니다.</p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const heroFrame = document.getElementById('heroFrame');
      const orbs = Array.from(document.querySelectorAll('.orb'));
      const mouse = { x: window.innerWidth * 0.5, y: window.innerHeight * 0.25, active: false };

      const orbConfig = [
        { baseX: 0.24, baseY: 0.18, driftX: 42, driftY: 24, speed: 0.00034, phase: 1.2, repel: 130, bobAmp: 6.4, bobFreq: 0.0016, elast: 0.065 },
        { baseX: 0.56, baseY: 0.14, driftX: 32, driftY: 18, speed: 0.00042, phase: 3.5, repel: 105, bobAmp: 5.2, bobFreq: 0.0019, elast: 0.072 },
        { baseX: 0.77, baseY: 0.2, driftX: 24, driftY: 16, speed: 0.00051, phase: 5.4, repel: 88, bobAmp: 4.4, bobFreq: 0.0022, elast: 0.078 }
      ];

      const state = orbConfig.map((cfg) => ({
        cfg,
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        scale: 1
      }));

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

      const getRectData = () => {
        const rect = heroFrame.getBoundingClientRect();
        return {
          left: rect.left,
          top: rect.top,
          width: rect.width,
          height: rect.height
        };
      };

      let frameRect = getRectData();

      const recalcBase = () => {
        frameRect = getRectData();
        state.forEach((s, i) => {
          s.x = frameRect.width * orbConfig[i].baseX;
          s.y = frameRect.height * orbConfig[i].baseY;
        });
      };

      recalcBase();

      const onPointer = (clientX, clientY) => {
        mouse.x = clientX;
        mouse.y = clientY;
        mouse.active = true;
      };

      window.addEventListener('pointermove', (e) => onPointer(e.clientX, e.clientY), { passive: true });
      window.addEventListener('pointerdown', (e) => onPointer(e.clientX, e.clientY), { passive: true });
      window.addEventListener('pointerleave', () => { mouse.active = false; });
      window.addEventListener('resize', recalcBase, { passive: true });

      let lastTime = performance.now();

      const animate = (now) => {
        const dt = Math.min((now - lastTime) / 16.666, 1.8);
        lastTime = now;

        frameRect = getRectData();

        state.forEach((s, i) => {
          const c = s.cfg;
          const t = now;

          const driftX = Math.sin(t * c.speed + c.phase) * c.driftX + Math.sin(t * c.speed * 0.63 + c.phase * 1.9) * c.driftX * 0.42;
          const driftY = Math.cos(t * c.speed * 0.82 + c.phase * 0.7) * c.driftY + Math.sin(t * c.speed * 0.37 + c.phase * 2.1) * c.driftY * 0.46;
          const bob = Math.sin(t * c.bobFreq + c.phase * 1.5) * c.bobAmp;

          const homeX = frameRect.width * c.baseX + driftX;
          const homeY = frameRect.height * c.baseY + driftY + bob;

          let repelX = 0;
          let repelY = 0;

          if (mouse.active) {
            const orbScreenX = frameRect.left + s.x;
            const orbScreenY = frameRect.top + s.y;
            const dx = orbScreenX - mouse.x;
            const dy = orbScreenY - mouse.y;
            const dist = Math.hypot(dx, dy);

            if (dist < c.repel) {
              const ratio = (c.repel - dist) / c.repel;
              const easing = ratio * ratio * (3 - 2 * ratio);
              const ux = dx / (dist || 1);
              const uy = dy / (dist || 1);
              const force = 2.4 * easing;
              repelX = ux * force;
              repelY = uy * force;
            }
          }

          const springX = (homeX - s.x) * c.elast;
          const springY = (homeY - s.y) * c.elast;

          s.vx = (s.vx + springX + repelX) * 0.92;
          s.vy = (s.vy + springY + repelY) * 0.92;

          s.x += s.vx * dt;
          s.y += s.vy * dt;

          const maxPad = 28;
          s.x = clamp(s.x, -maxPad, frameRect.width + maxPad);
          s.y = clamp(s.y, -maxPad, frameRect.height * 0.56);

          const pulse = 1 + Math.sin(t * c.bobFreq * 0.9 + c.phase) * 0.018;
          s.scale += (pulse - s.scale) * 0.08;

          orbs[i].style.transform = `translate3d(${s.x}px, ${s.y}px, 0) translate(-50%, -50%) scale(${s.scale})`;
        });

        requestAnimationFrame(animate);
      };

      requestAnimationFrame(animate);

      const sentences = [
        '니즈는 제가 읽을게요 👀',
        '복잡한 건 덜고, 중요한 건 남깁니다.',
        '깔끔하지만, 심심하진 않게.',
        '디자인은 감각이 아니라, 방향입니다.',
        '보기 좋은 디자인보다, 잘 쓰이는 디자인.',
        '고민은 줄이고, 결과는 또렷하게.'
      ];

      const starSvg = `
        <svg class="star" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <path d="M12 2.8L13.8 8.2L19.2 10L13.8 11.8L12 17.2L10.2 11.8L4.8 10L10.2 8.2L12 2.8Z" fill="currentColor"/>
          <path d="M18.8 14.2L19.6 16.4L21.8 17.2L19.6 18L18.8 20.2L18 18L15.8 17.2L18 16.4L18.8 14.2Z" fill="currentColor" opacity="0.9"/>
        </svg>`;

      const createMarqueeItems = () =>
        sentences
          .map((sentence) => `<span class="marquee__item"><span>${sentence}</span>${starSvg}</span>`)
          .join('');

      const groupA = document.getElementById('groupA');
      const groupB = document.getElementById('groupB');
      const html = createMarqueeItems();
      groupA.innerHTML = html;
      groupB.innerHTML = html;
    })();
  </script>
</body>
</html>
