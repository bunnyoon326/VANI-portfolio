    <script>
      const filterButtons = document.querySelectorAll(".work-filter-btn");
      const galleryCards = document.querySelectorAll(".work-gallery-card");


      const hideTimers = new WeakMap();

      const setFilter = (filter) => {
        galleryCards.forEach((card) => {
          const categories = card.dataset.category.split(/\s+/);
          const matches = filter === "all" || categories.includes(filter);

          if (matches) {
            const timerId = hideTimers.get(card);
            if (timerId) {
              clearTimeout(timerId);
              hideTimers.delete(card);
            }
            card.style.display = "block";
            card.classList.remove("is-hidden");
            requestAnimationFrame(() => card.classList.add("is-visible"));
            return;
          }

          card.classList.remove("is-visible");
          card.classList.add("is-hidden");
          const timeoutId = setTimeout(() => {
            if (card.classList.contains("is-hidden")) {
              card.style.display = "none";
            }
          }, 320);
          hideTimers.set(card, timeoutId);
        });
      };

      const reserveFilterButtonWidth = () => {
        const ruler = document.createElement("span");
        ruler.style.position = "absolute";
        ruler.style.visibility = "hidden";
        ruler.style.whiteSpace = "nowrap";
        ruler.style.pointerEvents = "none";
        ruler.style.inset = "-9999px auto auto -9999px";
        document.body.appendChild(ruler);

        filterButtons.forEach((button) => {
          const koLabel = button.dataset.ko;
          if (!koLabel) return;

          const enLabel = button.dataset.en || button.textContent.trim();
          const computed = window.getComputedStyle(button);
          ruler.style.font = computed.font;
          ruler.style.letterSpacing = computed.letterSpacing;

          ruler.textContent = enLabel;
          const enWidth = ruler.getBoundingClientRect().width;
          ruler.textContent = koLabel;
          const koWidth = ruler.getBoundingClientRect().width;

          const paddingX = parseFloat(computed.paddingLeft) + parseFloat(computed.paddingRight);
          const borderX = parseFloat(computed.borderLeftWidth) + parseFloat(computed.borderRightWidth);
          const reservedWidth = Math.ceil(Math.max(enWidth, koWidth) + paddingX + borderX);

          button.style.width = `${reservedWidth}px`;
        });

        ruler.remove();
      };

      reserveFilterButtonWidth();

      filterButtons.forEach((button) => {
        if (button.dataset.filter !== "all") {
          setButtonLabel(button, false);

          button.addEventListener("mouseenter", () => setButtonLabel(button, true));
          button.addEventListener("mouseleave", () => setButtonLabel(button, false));
          button.addEventListener("focus", () => setButtonLabel(button, true));
          button.addEventListener("blur", () => setButtonLabel(button, false));
        }

        button.addEventListener("click", () => {
          filterButtons.forEach((item) => {
            item.classList.remove("active");
            item.setAttribute("aria-selected", "false");
          });

          button.classList.add("active");
          button.setAttribute("aria-selected", "true");
          setFilter(button.dataset.filter);
        });
      });
    </script>
